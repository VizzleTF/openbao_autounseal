name: "Docker Image CI"
on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744  # v3
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag openbao-autounseal:$(date +%s)
