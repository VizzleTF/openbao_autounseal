# Default values for openbao-autounseal.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/vizzletf/openbao-autounseal
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""  # defaults to .Chart.AppVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# Hardened by default. The image is gcr.io/distroless/python3-debian13:nonroot
# (uid/gid 65532) and the controller writes nothing to disk, so it runs as
# non-root with a read-only root filesystem and no capabilities. Satisfies the
# PodSecurity "restricted" profile out of the box.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL


# The controller is a tiny poll loop; conservative limits keep it from being
# OOM/burst-throttled while bounding blast radius. Override as needed.
resources:
  limits:
    cpu: 100m
    memory: 128Mi
    ephemeral-storage: 64Mi
  requests:
    cpu: 25m
    memory: 64Mi
    ephemeral-storage: 16Mi

# Liveness: the app touches /tmp/heartbeat each scan cycle; the probe restarts
# the pod if that file goes stale (loop wedged). staleSeconds must comfortably
# exceed settings.scan_delay.
livenessProbe:
  enabled: true
  staleSeconds: 90
  initialDelaySeconds: 15
  periodSeconds: 30
  failureThreshold: 3
  # The probe spawns a full python3 interpreter (distroless has no shell), so a
  # cold start under the 100m CPU limit can exceed the 1s default and the kubelet
  # would kill a healthy pod. Give it real headroom.
  timeoutSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}

settings:
  # https by default; the controller skips cert verification for pod-IP TLS
  # unless OPENBAO_CA_CERT / OPENBAO_TLS_SKIP_VERIFY say otherwise. Override with
  # an http:// URL if your OpenBao service does not terminate TLS.
  openbao_url: "https://openbao.openbao:8200"
  # openbao unlocking keys settings:
  openbao_secret_shares: 3
  openbao_secret_threshold: 3
  # secret for storing openbao root token
  openbao_root_token_secret: openbao-root-token
  # secret for storing openbao unlock keys
  openbao_keys_secret: openbao-keys
  # time between polling for openbao status, in seconds
  scan_delay: 5
  # openbao label to use to retrieve openbao instance
  openbao_label_selector: app.kubernetes.io/instance=openbao,component=server
