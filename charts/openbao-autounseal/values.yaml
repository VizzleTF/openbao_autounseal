# Default values for openbao-autounseal.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/vizzletf/openbao-autounseal
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""  # defaults to .Chart.AppVersion (0.5.4)

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000


resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

settings:
  openbao_url: "http://openbao.openbao:8200"
  # openbao unlocking keys settings:
  openbao_secret_shares: 3
  openbao_secret_threshold: 3
  # secret for storing openbao root token
  openbao_root_token_secret: openbao-root-token
  # secret for storing openbao unlock keys
  openbao_keys_secret: openbao-keys
  # time between polling for openbao status, in seconds
  scan_delay: 5
  # openbao label to use to retrieve openbao instance
  openbao_label_selector: app.kubernetes.io/instance=openbao,component=server
