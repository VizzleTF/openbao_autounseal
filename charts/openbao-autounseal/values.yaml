# Default values for openbao-autounseal.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/vizzletf/openbao-autounseal
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""  # defaults to .Chart.AppVersion (0.5.4)

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# Hardened by default. The image is gcr.io/distroless/python3-debian13:nonroot
# (uid/gid 65532) and the controller writes nothing to disk, so it runs as
# non-root with a read-only root filesystem and no capabilities. Satisfies the
# PodSecurity "restricted" profile out of the box.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL


resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Liveness: the app touches /tmp/heartbeat each scan cycle; the probe restarts
# the pod if that file goes stale (loop wedged). staleSeconds must comfortably
# exceed settings.scan_delay.
livenessProbe:
  enabled: true
  staleSeconds: 90
  initialDelaySeconds: 15
  periodSeconds: 30
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

settings:
  openbao_url: "http://openbao.openbao:8200"
  # openbao unlocking keys settings:
  openbao_secret_shares: 3
  openbao_secret_threshold: 3
  # secret for storing openbao root token
  openbao_root_token_secret: openbao-root-token
  # secret for storing openbao unlock keys
  openbao_keys_secret: openbao-keys
  # time between polling for openbao status, in seconds
  scan_delay: 5
  # openbao label to use to retrieve openbao instance
  openbao_label_selector: app.kubernetes.io/instance=openbao,component=server
