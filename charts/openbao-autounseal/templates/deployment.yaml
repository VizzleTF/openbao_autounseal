apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openbao-autounseal.fullname" . }}
  labels:
    {{- include "openbao-autounseal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openbao-autounseal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openbao-autounseal.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Token is required: the controller calls the Kubernetes API (in-cluster
      # config) and is bound to a least-privilege Role in rbac.yaml.
      serviceAccountName: {{ include "openbao-autounseal.serviceAccountName" . }}  # NOSONAR
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        # CPU/memory/ephemeral-storage limits are set via .Values.resources
        # (see values.yaml); Sonar cannot resolve the templated toYaml block.
        - name: {{ .Chart.Name }}  # NOSONAR
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
          - configMapRef:
              name: {{ include "openbao-autounseal.fullname" . }}
              optional: false
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import os, sys, time
                  hb = os.environ.get("HEARTBEAT_FILE", "/tmp/heartbeat")
                  fresh = os.path.exists(hb) and time.time() - os.path.getmtime(hb) < {{ .Values.livenessProbe.staleSeconds }}
                  sys.exit(0 if fresh else 1)
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
