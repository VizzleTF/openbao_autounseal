{{/*
Namespaced Role, least privilege. The controller only:
  - lists pods (discovery)        -> pods: list
  - reads/creates/deletes secrets -> secrets: get, create, delete
in its own namespace, so a namespaced Role/RoleBinding is enough — no
cluster-wide access and none of the verbs it never calls (watch/update/patch).
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openbao-autounseal.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openbao-autounseal.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "openbao-autounseal.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openbao-autounseal.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "openbao-autounseal.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "openbao-autounseal.fullname" . }}
