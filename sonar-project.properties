sonar.projectKey=VizzleTF_openbao_autounseal
sonar.organization=vizzletf

# Prod runs python 3.13 (distroless); CI lints 3.11-3.13.
sonar.python.version=3.11, 3.12, 3.13

# Test sources and coverage report (produced by pytest-cov in the CI workflow).
sonar.tests=tests
sonar.python.coverage.reportPaths=coverage.xml

# Accepted findings (documented risk acceptances — see CHANGELOG 0.5.12):
#  e1 python:S5443      heartbeat lives in a private per-pod emptyDir, not shared /tmp
#  e2 kubernetes:S6865  controller must mount its SA token to reach the k8s API
#                       (bound to a least-privilege Role in rbac.yaml)
#  e3 docker:S8544      dependency versions are pinned in requirements.txt
#  e4 githubactions:S8544  CI deps pinned in requirements.txt; pip self-upgrade only
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5443
sonar.issue.ignore.multicriteria.e1.resourceKey=**/app.py
sonar.issue.ignore.multicriteria.e2.ruleKey=kubernetes:S6865
sonar.issue.ignore.multicriteria.e2.resourceKey=**/deployment.yaml
sonar.issue.ignore.multicriteria.e3.ruleKey=docker:S8544
sonar.issue.ignore.multicriteria.e3.resourceKey=**/Dockerfile
sonar.issue.ignore.multicriteria.e4.ruleKey=githubactions:S8544
sonar.issue.ignore.multicriteria.e4.resourceKey=**/workflows/*.yml

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=openbao-autounseal
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8
